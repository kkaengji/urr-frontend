name: CI

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (Next.js)
        run: npm run build

      # Discord 알림 (성공)
      - name: Discord notification (success)
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
            -d '{"embeds": [{"title": "✅ 프론트 CI 성공", "description": "**${{ github.repository }}**\nPR: [${{ github.event.pull_request.title }}](${{ github.event.pull_request.html_url }})\n커밋: [`${{ github.event.pull_request.head.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.event.pull_request.head.sha }})", "color": 65280}]}' \
            ${{ secrets.DISCORD_WEBHOOK_URL }}
          curl -H "Content-Type: application/json" \
            -d '{"embeds": [{"title": "✅ 프론트 CI 성공", "description": "**${{ github.repository }}**\nPR: [${{ github.event.pull_request.title }}](${{ github.event.pull_request.html_url }})\n커밋: [`${{ github.event.pull_request.head.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.event.pull_request.head.sha }})", "color": 65280}]}' \
            ${{ secrets.DISCORD_WEBHOOK_URL_2 }}

      # Discord 알림 (실패)
      - name: Discord notification (failure)
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
            -d '{"embeds": [{"title": "❌ 프론트 CI 실패", "description": "**${{ github.repository }}**\nPR: [${{ github.event.pull_request.title }}](${{ github.event.pull_request.html_url }})\n커밋: [`${{ github.event.pull_request.head.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.event.pull_request.head.sha }})\n[로그 확인](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "color": 16711680}]}' \
            ${{ secrets.DISCORD_WEBHOOK_URL }}
          curl -H "Content-Type: application/json" \
            -d '{"embeds": [{"title": "❌ 프론트 CI 실패", "description": "**${{ github.repository }}**\nPR: [${{ github.event.pull_request.title }}](${{ github.event.pull_request.html_url }})\n커밋: [`${{ github.event.pull_request.head.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.event.pull_request.head.sha }})\n[로그 확인](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "color": 16711680}]}' \
            ${{ secrets.DISCORD_WEBHOOK_URL_2 }}
